version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spotfinder-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: gateway/api-gateway/SpotFinder.ApiGateway/Dockerfile
    container_name: spotfinder-api-gateway
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/src/SpotFinder.IdentityService.API/Dockerfile
    container_name: spotfinder-identity
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__IdentityDb=Host=postgres;Port=5432;Database=spotfinder_identity;Username=postgres;Password=postgres

  geo-service:
    build:
      context: .
      dockerfile: services/geo-service/src/SpotFinder.GeoService.API/Dockerfile
    container_name: spotfinder-geo
    ports:
      - "5002:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__GeoDb=Host=postgres;Port=5432;Database=spotfinder_geo;Username=postgres;Password=postgres

  place-service:
    build:
      context: .
      dockerfile: services/place-service/src/SpotFinder.PlaceService.API/Dockerfile
    container_name: spotfinder-place
    ports:
      - "5003:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__PlaceDb=Host=postgres;Port=5432;Database=spotfinder_place;Username=postgres;Password=postgres

  label-service:
    build:
      context: .
      dockerfile: services/label-service/src/SpotFinder.LabelService.API/Dockerfile
    container_name: spotfinder-label
    ports:
      - "5004:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__LabelDb=Host=postgres;Port=5432;Database=spotfinder_label;Username=postgres;Password=postgres

  search-service:
    build:
      context: .
      dockerfile: services/search-service/src/SpotFinder.SearchService.API/Dockerfile
    container_name: spotfinder-search
    ports:
      - "5005:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__SearchDb=Host=postgres;Port=5432;Database=spotfinder_search;Username=postgres;Password=postgres

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/src/SpotFinder.AdminService.API/Dockerfile
    container_name: spotfinder-admin
    ports:
      - "5006:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__AdminDb=Host=postgres;Port=5432;Database=spotfinder_admin;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379

  redis:
    image: redis:7-alpine
    container_name: spotfinder-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
