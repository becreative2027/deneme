version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spotfinder-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: spotfinder-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/src/SpotFinder.IdentityService.API/Dockerfile
    container_name: spotfinder-identity
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__IdentityDb=Host=postgres;Port=5432;Database=spotfinder_identity;Username=postgres;Password=postgres

  geo-service:
    build:
      context: .
      dockerfile: services/geo-service/src/SpotFinder.GeoService.API/Dockerfile
    container_name: spotfinder-geo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__GeoDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres

  place-service:
    build:
      context: .
      dockerfile: services/place-service/src/SpotFinder.PlaceService.API/Dockerfile
    container_name: spotfinder-place
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__PlaceDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres

  label-service:
    build:
      context: .
      dockerfile: services/label-service/src/SpotFinder.LabelService.API/Dockerfile
    container_name: spotfinder-label
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__LabelDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres

  search-service:
    build:
      context: .
      dockerfile: services/search-service/src/SpotFinder.SearchService.API/Dockerfile
    container_name: spotfinder-search
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__SearchDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres

  admin-service:
    build:
      context: .
      dockerfile: services/admin-service/src/SpotFinder.AdminService.API/Dockerfile
    container_name: spotfinder-admin
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__AdminDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379

  social-graph-service:
    build:
      context: .
      dockerfile: services/social-graph-service/src/SpotFinder.SocialGraphService.API/Dockerfile
    container_name: spotfinder-social
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__SocialDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres

  content-service:
    build:
      context: .
      dockerfile: services/content-service/src/SpotFinder.ContentService.API/Dockerfile
    container_name: spotfinder-content
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__ContentDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres

  feed-service:
    build:
      context: .
      dockerfile: services/feed-service/src/SpotFinder.FeedService.API/Dockerfile
    container_name: spotfinder-feed
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__FeedDb=Host=postgres;Port=5432;Database=spotfinder;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379

  api-gateway:
    build:
      context: .
      dockerfile: gateway/api-gateway/SpotFinder.ApiGateway/Dockerfile
    container_name: spotfinder-api-gateway
    ports:
      - "5000:8080"
    depends_on:
      - identity-service
      - geo-service
      - place-service
      - label-service
      - search-service
      - admin-service
      - social-graph-service
      - content-service
      - feed-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ReverseProxy__Clusters__identity-cluster__Destinations__destination1__Address=http://spotfinder-identity:8080
      - ReverseProxy__Clusters__geo-cluster__Destinations__destination1__Address=http://spotfinder-geo:8080
      - ReverseProxy__Clusters__place-cluster__Destinations__destination1__Address=http://spotfinder-place:8080
      - ReverseProxy__Clusters__label-cluster__Destinations__destination1__Address=http://spotfinder-label:8080
      - ReverseProxy__Clusters__search-cluster__Destinations__destination1__Address=http://spotfinder-search:8080
      - ReverseProxy__Clusters__admin-cluster__Destinations__destination1__Address=http://spotfinder-admin:8080
      - ReverseProxy__Clusters__social-cluster__Destinations__destination1__Address=http://spotfinder-social:8080
      - ReverseProxy__Clusters__content-cluster__Destinations__destination1__Address=http://spotfinder-content:8080
      - ReverseProxy__Clusters__feed-cluster__Destinations__destination1__Address=http://spotfinder-feed:8080
      - Cors__Origins__0=http://159.89.13.168:3000
      - Cors__Origins__1=http://159.89.13.168:3001
      - Cors__Origins__2=http://localhost:3000
      - Cors__Origins__3=http://localhost:3001

  web:
    build:
      context: ./web/spotfinder-web
      dockerfile: Dockerfile
      args:
        - API_URL=http://api-gateway:8080
        - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=dnwylcwex
        - NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=spotfinder_posts
    container_name: spotfinder-web
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway

  admin-web:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://159.89.13.168:5000
    container_name: spotfinder-admin-web
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
    environment:
      - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=dnwylcwex
      - NEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=spotfinder_posts

volumes:
  postgres-data:
